# Deploy static site to Cloudflare Workers (Static Assets)
# Replaces the old Pages-based deploy that was returning "Unauthorized"
#
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN — API Token with "Workers Scripts: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (set in repo secrets only; never commit)
#
# Production URL: https://authentic-wellness.<your-subdomain>.workers.dev
# Custom domain: Cloudflare dashboard → Workers & Pages → authentic-wellness → Settings → Domains & Routes
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set."
            echo "::error::Create token: dash.cloudflare.com → My Profile → API Tokens"
            echo "::error::Template: 'Edit Cloudflare Workers' (NOT Pages)"
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set."
            echo "::error::Find it at dash.cloudflare.com → any zone → Overview → Account ID"
            exit 1
          fi
          echo "Both secrets verified."

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy
