# Deploy static site to Cloudflare Workers (Static Assets)
# Replaces the old Pages-based deploy that was returning "Unauthorized"
#
# Repository: https://github.com/transformativewellness/authentic-wellness-website
#
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN — Create while logged into Cloudflare as info@transformativemedspa.com
#     (Authentic Wellness / authenticwellness.com). Must have "Edit Workers Scripts" permission.
#   CLOUDFLARE_ACCOUNT_ID — Account ID from that same Authentic Wellness dashboard
#     (any zone → Overview → Account ID). Must be the info@transformativemedspa.com org.
#
# Production URL: https://www.authenticwellness.com (via custom route)
# Worker name: authentic-wellness (see wrangler.toml — do NOT change)
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set."
            echo "::error::Create token: dash.cloudflare.com → My Profile → API Tokens"
            echo "::error::Template: 'Edit Cloudflare Workers' (NOT Pages)"
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set."
            echo "::error::Find it at dash.cloudflare.com → any zone → Overview → Account ID"
            exit 1
          fi
          echo "Both secrets verified."

      - name: Validate wrangler.toml
        run: |
          if [ ! -f wrangler.toml ]; then
            echo "::error::wrangler.toml missing at repo root"
            exit 1
          fi
          if ! grep -q '^name = "authentic-wellness"' wrangler.toml; then
            echo "::error::wrangler.toml has wrong Worker name — expected name = \"authentic-wellness\""
            cat wrangler.toml
            exit 1
          fi
          echo "wrangler.toml looks correct."
          npx --yes wrangler@4 deploy --dry-run --outdir /tmp/wrangler-dryrun
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy
